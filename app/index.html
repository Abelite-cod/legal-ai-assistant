<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Legal AI Chatbot</title>

<style>
:root {
  --bg: #0b0f19;
  --panel: rgba(255,255,255,0.04);
  --panel2: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.08);
  --text: #e5e7eb;
  --muted: #9ca3af;
  --accent: #6366f1;
}

/* GLOBAL */
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
  background: radial-gradient(circle at top, #111827, #050711);
  color: var(--text);
  height: 100vh;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: var(--panel);
  border-right: 1px solid var(--border);
  backdrop-filter: blur(12px);
  display: flex;
  flex-direction: column;
}

.sidebar-header {
  padding: 16px;
}

.new-chat {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

.new-chat:hover {
  transform: translateY(-1px);
  opacity: 0.95;
}

.chat-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.chat-item {
  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px;
  color: var(--muted);
  transition: 0.2s;
}

.chat-item:hover {
  background: var(--panel2);
  color: var(--text);
}

.chat-item.active {
  background: rgba(99,102,241,0.15);
  color: white;
}

/* MAIN */
.chat-container {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  padding: 14px 20px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(10px);
  font-weight: 600;
}

/* CHAT BOX */
.chat-box {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* MESSAGES */
.message {
  max-width: 720px;
  padding: 12px 14px;
  border-radius: 14px;
  font-size: 14px;
  line-height: 1.5;
  animation: fadeIn 0.15s ease-in;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

.user {
  background: linear-gradient(135deg, #6366f1, #4f46e5);
  color: white;
  align-self: flex-end;
}

.bot {
  background: var(--panel);
  border: 1px solid var(--border);
  align-self: flex-start;
  color: var(--text);
}

/* INPUT */
.input-box {
  padding: 16px;
  border-top: 1px solid var(--border);
  background: var(--panel);
  display: flex;
  gap: 10px;
  backdrop-filter: blur(10px);
}

input {
  flex: 1;
  padding: 12px 14px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: rgba(0,0,0,0.2);
  color: white;
  outline: none;
}

input:focus {
  border-color: var(--accent);
}

button.send {
  padding: 12px 16px;
  border-radius: 12px;
  border: none;
  background: var(--accent);
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button.send:hover {
  transform: translateY(-1px);
  opacity: 0.9;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-header">
    <button class="new-chat" onclick="createNewChat()">+ New Chat</button>
  </div>
  <div id="chatList" class="chat-list"></div>
</div>

<!-- MAIN -->
<div class="chat-container">
  <div class="header">⚖️ Legal AI Assistant</div>
  <div id="chatBox" class="chat-box"></div>

  <div class="input-box">
    <input id="messageInput" placeholder="Ask a legal question..." />
    <button class="send" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const chatBox = document.getElementById("chatBox");
const chatList = document.getElementById("chatList");
const input = document.getElementById("messageInput");

let chats = JSON.parse(localStorage.getItem("chats")) || {};
let currentChatId = null;

/* CREATE CHAT */
function createNewChat() {
  const id = "chat_" + Date.now();
  chats[id] = [];
  currentChatId = id;
  saveChats();
  renderChats();
  renderMessages();
}

/* SWITCH CHAT */
function switchChat(id) {
  currentChatId = id;
  renderChats();
  renderMessages();
}

/* RENDER SIDEBAR */
function renderChats() {
  chatList.innerHTML = "";
  Object.keys(chats).forEach(id => {
    const div = document.createElement("div");
    div.className = "chat-item " + (id === currentChatId ? "active" : "");
    div.innerText = "Chat " + id.slice(-4);
    div.onclick = () => switchChat(id);
    chatList.appendChild(div);
  });
}

/* RENDER MESSAGES */
function renderMessages() {
  chatBox.innerHTML = "";
  if (!currentChatId) return;

  chats[currentChatId].forEach(msg => {
    addMessage(msg.text, msg.sender, false);
  });

  chatBox.scrollTop = chatBox.scrollHeight;
}

/* ADD MESSAGE */
function addMessage(text, sender, save=true) {
  const div = document.createElement("div");
  div.className = "message " + sender;
  div.innerText = text;
  chatBox.appendChild(div);

  if (save) {
    chats[currentChatId].push({ text, sender });
    saveChats();
  }

  chatBox.scrollTop = chatBox.scrollHeight;
}

/* SAVE */
function saveChats() {
  localStorage.setItem("chats", JSON.stringify(chats));
}

/* SEND MESSAGE */
async function sendMessage() {
  const message = input.value.trim();
  if (!message || !currentChatId) return;

  addMessage(message, "user");
  input.value = "";

  try {
    const response = await fetch("https://jalisa-unmodish-cousinly.ngrok-free.dev/ask", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        session_id: currentChatId,
        question: message
      })
    });

    const data = await response.json();
    addMessage(data.answer, "bot");

  } catch (err) {
    addMessage("⚠️ Server error", "bot");
  }
}

/* INIT */
if (Object.keys(chats).length === 0) {
  createNewChat();
} else {
  currentChatId = Object.keys(chats)[0];
}

renderChats();
renderMessages();
</script>

</body>
</html>
