<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Legal AI Assistant</title>

<!-- No cache — always serve fresh -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<!-- PWA -->
<link rel="manifest" href="/static/manifest.json" />
<meta name="theme-color" content="#0f0f0f" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<meta name="apple-mobile-web-app-title" content="LegalAI" />

<style>
/* ── RESET & BASE ─────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #242424;
  --border: #2e2e2e;
  --text: #ececec;
  --muted: #8e8ea0;
  --accent: #6366f1;
  --accent2: #8b5cf6;
  --user-bubble: #2f2f2f;
  --bot-bubble: transparent;
  --success: #10b981;
  --danger: #ef4444;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}

html, body {
  height: 100%;
  /* Use dynamic viewport height so layout shrinks when keyboard opens */
  height: 100dvh;
  overflow: hidden;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
  position: fixed;
  inset: 0;
}

/* ── TOP HEADER ──────────────────────────── */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  padding-top: calc(12px + env(safe-area-inset-top, 0px));
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 10;
  /* Fixed so keyboard never pushes it off screen */
  position: sticky;
  top: 0;
}

.top-bar-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.menu-btn {
  background: none;
  border: none;
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  padding: 6px;
  border-radius: 8px;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 36px;
  min-height: 36px;
}
.menu-btn:hover { background: var(--surface2); }

.app-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
}

.app-subtitle {
  font-size: 11px;
  color: var(--muted);
  margin-top: 1px;
}

.new-chat-btn {
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  border: none;
  color: white;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  padding: 8px 14px;
  border-radius: 20px;
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
  transition: 0.15s;
}
.new-chat-btn:hover { opacity: 0.9; }
.new-chat-btn:active { transform: scale(0.96); }

/* doc loaded indicator */
.doc-pill {
  font-size: 11px;
  font-weight: 600;
  color: var(--success);
  background: rgba(16,185,129,0.12);
  border: 1px solid rgba(16,185,129,0.25);
  border-radius: 20px;
  padding: 3px 10px;
  display: none;
  white-space: nowrap;
}
.doc-pill.visible { display: inline-flex; align-items: center; gap: 4px; }

/* ── OVERLAY ─────────────────────────────── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 40;
  backdrop-filter: blur(3px);
}
.overlay.visible { display: block; }

/* ── DRAWER (sessions sidebar) ───────────── */
.drawer {
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  width: 280px;
  background: #111;
  border-right: 1px solid var(--border);
  z-index: 50;
  display: flex;
  flex-direction: column;
  transform: translateX(-100%);
  transition: transform 0.25s ease;
}
.drawer.open { transform: translateX(0); }

.drawer-header {
  padding: 16px;
  padding-top: calc(16px + var(--safe-top));
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.drawer-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}

.drawer-close {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 18px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
}
.drawer-close:hover { color: var(--text); background: var(--surface2); }

.session-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.session-item {
  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 13px;
  color: var(--muted);
  transition: 0.15s;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  min-height: 44px;
}
.session-item:hover { background: var(--surface2); color: var(--text); }
.session-item.active { background: rgba(99,102,241,0.15); color: var(--text); }
.session-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.session-del {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 13px;
  padding: 4px 6px;
  border-radius: 4px;
  opacity: 0;
  min-width: 28px;
  min-height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.session-item:hover .session-del { opacity: 1; }
.session-del:hover { color: var(--danger); background: rgba(239,68,68,0.1); }

/* ── CHAT AREA ───────────────────────────── */
.chat-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  -webkit-overflow-scrolling: touch;
  scroll-behavior: smooth;
  /* Ensure last message is never hidden behind bottom bar */
  padding-bottom: 8px;
}

/* ── WELCOME ─────────────────────────────── */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  gap: 16px;
  padding: 32px 20px;
  text-align: center;
}

.welcome-logo {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
}

.welcome h2 {
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
}

.welcome p {
  font-size: 14px;
  color: var(--muted);
  max-width: 300px;
  line-height: 1.6;
}

.quick-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 100%;
  max-width: 340px;
  margin-top: 8px;
}

.quick-action {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  cursor: pointer;
  transition: 0.15s;
  text-align: left;
}
.quick-action:hover { background: var(--surface2); border-color: var(--accent); }
.quick-action:active { transform: scale(0.98); }

.qa-icon {
  font-size: 20px;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface2);
  border-radius: 10px;
  flex-shrink: 0;
}

.qa-text { flex: 1; }
.qa-title { font-size: 13px; font-weight: 600; color: var(--text); }
.qa-desc  { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ── MESSAGES ────────────────────────────── */
.msg-group {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-bottom: 8px;
}

.msg {
  padding: 10px 14px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.55;
  max-width: 85%;
  word-break: break-word;
  animation: popIn 0.18s ease-out;
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.96) translateY(4px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.msg.user {
  background: var(--user-bubble);
  color: var(--text);
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}

.msg.bot {
  background: var(--bot-bubble);
  color: var(--text);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
  padding-left: 4px;
  max-width: 100%;
}

.bot-avatar {
  width: 28px;
  height: 28px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
  margin-bottom: 4px;
}

.bot-row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  align-self: flex-start;
  max-width: 100%;
}

.bot-content { flex: 1; min-width: 0; }

.sources-tag {
  margin-top: 6px;
  font-size: 11px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 4px;
}

/* Typing indicator */
.typing-row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  align-self: flex-start;
  margin-bottom: 8px;
  animation: popIn 0.18s ease-out;
}

.typing-dots {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 12px 16px;
  background: var(--surface);
  border-radius: 18px;
  border-bottom-left-radius: 4px;
}

.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
  animation: bounce 1.2s infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30%            { transform: translateY(-5px); opacity: 1; }
}

/* ── BOTTOM INPUT AREA ───────────────────── */
.bottom-area {
  flex-shrink: 0;
  background: var(--bg);
  padding: 10px 12px;
  /* Respect phone navigation bar (Android gesture bar, iPhone home indicator) */
  padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
  border-top: 1px solid var(--border);
  /* Stick to bottom — never covered by nav bar */
  position: sticky;
  bottom: 0;
}

/* Attachment popup */
.attach-popup {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 8px;
  margin-bottom: 8px;
  animation: slideUp 0.18s ease-out;
}
.attach-popup.open { display: block; }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.attach-option {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.15s;
  position: relative;
}
.attach-option:hover { background: var(--surface2); }
.attach-option:active { transform: scale(0.98); }

.attach-option input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}

.attach-icon {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: rgba(99,102,241,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.attach-label { font-size: 14px; font-weight: 500; color: var(--text); }
.attach-desc  { font-size: 12px; color: var(--muted); margin-top: 1px; }

/* Upload status bar */
.upload-bar {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 10px;
  margin-bottom: 8px;
  font-size: 12px;
  font-weight: 500;
}
.upload-bar.loading { display: flex; background: rgba(99,102,241,0.1); color: var(--accent); }
.upload-bar.success { display: flex; background: rgba(16,185,129,0.1); color: var(--success); }
.upload-bar.error   { display: flex; background: rgba(239,68,68,0.1);  color: var(--danger); }

/* Input row */
.input-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 6px 6px 6px 8px;
  transition: border-color 0.15s;
}
.input-row:focus-within { border-color: rgba(99,102,241,0.5); }

.plus-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: var(--surface2);
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: 0.15s;
  line-height: 1;
}
.plus-btn:hover { background: var(--border); }
.plus-btn.active { background: var(--accent); color: white; transform: rotate(45deg); }

.msg-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 16px;
  font-family: inherit;
  resize: none;
  min-height: 24px;
  max-height: 120px;
  line-height: 1.5;
  padding: 6px 4px;
  -webkit-appearance: none;
}
.msg-input::placeholder { color: var(--muted); }

.send-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: var(--accent);
  color: white;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: 0.15s;
}
.send-btn:hover:not(:disabled) { background: var(--accent2); }
.send-btn:active:not(:disabled) { transform: scale(0.92); }
.send-btn:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; }

/* ── SCROLLBAR ───────────────────────────── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

/* ── DESKTOP: show drawer inline ─────────── */
@media (min-width: 768px) {
  body { flex-direction: row; }

  .drawer {
    position: relative;
    transform: none !important;
    width: 260px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
  }

  .overlay { display: none !important; }
  .menu-btn { display: none; }

  .main-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    height: 100vh;
  }

  .msg { max-width: 70%; }
}

@media (max-width: 767px) {
  .main-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    /* Use full available height — shrinks when keyboard opens on modern browsers */
    height: 100dvh;
    min-width: 0;
    overflow: hidden;
  }
}
</style>
</head>

<body>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>

<!-- ── DRAWER (session history) ───────────── -->
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <span class="drawer-title">⚖️ Chat History</span>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="session-list" id="sessionList"></div>
</div>

<!-- ── MAIN PANEL ─────────────────────────── -->
<div class="main-panel">

  <!-- Top bar -->
  <div class="top-bar">
    <div class="top-bar-left">
      <button class="menu-btn" onclick="openDrawer()" title="History">☰</button>
      <div>
        <div class="app-title">⚖️ Legal AI</div>
        <div class="app-subtitle">RAG + Gemini</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="doc-pill" id="docPill">📄 Doc ready</span>
      <button class="new-chat-btn" onclick="createNewChat()" title="New chat">✏️ New Chat</button>
    </div>
  </div>

  <!-- Chat messages -->
  <div class="chat-area" id="chatArea"></div>

  <!-- Bottom input -->
  <div class="bottom-area">

    <!-- Attach popup -->
    <div class="attach-popup" id="attachPopup">
      <div class="attach-option">
        <input type="file" accept=".pdf" id="pdfInput" onchange="handleFileSelect(event)" />
        <div class="attach-icon">📄</div>
        <div>
          <div class="attach-label">Upload PDF Document</div>
          <div class="attach-desc">Ask questions about any legal document</div>
        </div>
      </div>
    </div>

    <!-- Upload status -->
    <div class="upload-bar" id="uploadBar"></div>

    <!-- Input row -->
    <div class="input-row">
      <button class="plus-btn" id="plusBtn" onclick="toggleAttach()" title="Attach file">+</button>
      <textarea
        class="msg-input"
        id="msgInput"
        placeholder="Ask anything..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>

  </div>
</div><!-- end main-panel -->

<script>
// ── CONFIG ────────────────────────────────────────────────────
const API_BASE = (window.location.protocol === 'file:')
  ? 'http://localhost:8000'
  : window.location.origin;

// ── STATE ─────────────────────────────────────────────────────
let chats = JSON.parse(localStorage.getItem("legalai_v2") || "{}");
let currentId = null;
let busy = false;
let attachOpen = false;

// ── INIT ──────────────────────────────────────────────────────
if (!Object.keys(chats).length) {
  createNewChat();
} else {
  currentId = Object.keys(chats)[0];
  renderSessions();
  renderMessages();
}

// ── DRAWER ────────────────────────────────────────────────────
function openDrawer() {
  document.getElementById("drawer").classList.add("open");
  document.getElementById("overlay").classList.add("visible");
}
function closeDrawer() {
  document.getElementById("drawer").classList.remove("open");
  document.getElementById("overlay").classList.remove("visible");
}

// ── ATTACH POPUP ──────────────────────────────────────────────
function toggleAttach() {
  attachOpen = !attachOpen;
  document.getElementById("attachPopup").classList.toggle("open", attachOpen);
  document.getElementById("plusBtn").classList.toggle("active", attachOpen);
}

function closeAttach() {
  attachOpen = false;
  document.getElementById("attachPopup").classList.remove("open");
  document.getElementById("plusBtn").classList.remove("active");
}

// Close attach popup when clicking elsewhere
document.addEventListener("click", (e) => {
  if (attachOpen &&
      !e.target.closest("#attachPopup") &&
      !e.target.closest("#plusBtn")) {
    closeAttach();
  }
});

// ── SESSIONS ──────────────────────────────────────────────────
function createNewChat() {
  const id = "c_" + Date.now();
  chats[id] = { title: "New Chat", messages: [] };
  currentId = id;
  save();
  renderSessions();
  renderMessages();
  closeDrawer();
}

function switchChat(id) {
  currentId = id;
  renderSessions();
  renderMessages();
  closeDrawer();
}

async function deleteChat(id, e) {
  e.stopPropagation();
  delete chats[id];
  try { await fetch(`${API_BASE}/sessions/${id}`, { method: "DELETE" }); } catch (_) {}
  if (currentId === id) {
    const keys = Object.keys(chats);
    currentId = keys.length ? keys[0] : null;
    if (!currentId) createNewChat();
  }
  save();
  renderSessions();
  renderMessages();
}

function save() {
  localStorage.setItem("legalai_v2", JSON.stringify(chats));
}

function renderSessions() {
  const list = document.getElementById("sessionList");
  list.innerHTML = "";
  Object.entries(chats).reverse().forEach(([id, chat]) => {
    const div = document.createElement("div");
    div.className = "session-item" + (id === currentId ? " active" : "");

    const lbl = document.createElement("span");
    lbl.className = "session-label";
    lbl.textContent = chat.title || "New Chat";

    const del = document.createElement("button");
    del.className = "session-del";
    del.textContent = "✕";
    del.onclick = (e) => deleteChat(id, e);

    div.appendChild(lbl);
    div.appendChild(del);
    div.onclick = () => switchChat(id);
    list.appendChild(div);
  });
}

// ── RENDER MESSAGES ───────────────────────────────────────────
function renderMessages() {
  const area = document.getElementById("chatArea");
  area.innerHTML = "";

  if (!currentId || !chats[currentId]) return;

  const msgs = chats[currentId].messages;
  if (!msgs.length) {
    area.innerHTML = `
      <div class="welcome">
        <div class="welcome-logo">⚖️</div>
        <h2>Legal AI Assistant</h2>
        <p>Ask legal questions, upload documents, or get guidance on your situation.</p>
        <div class="quick-actions">
          <div class="quick-action" onclick="useQuick(this)">
            <div class="qa-icon">⚖️</div>
            <div class="qa-text">
              <div class="qa-title">Wrongful termination</div>
              <div class="qa-desc">What are my rights if I was fired unfairly?</div>
            </div>
          </div>
          <div class="quick-action" onclick="useQuick(this)">
            <div class="qa-icon">📄</div>
            <div class="qa-text">
              <div class="qa-title">Analyse a contract</div>
              <div class="qa-desc">Upload a PDF and ask questions about it</div>
            </div>
          </div>
          <div class="quick-action" onclick="useQuick(this)">
            <div class="qa-icon">🏠</div>
            <div class="qa-text">
              <div class="qa-title">Tenant rights</div>
              <div class="qa-desc">My landlord won't return my deposit</div>
            </div>
          </div>
          <div class="quick-action" onclick="useQuick(this)">
            <div class="qa-icon">🔒</div>
            <div class="qa-text">
              <div class="qa-title">NDA explained</div>
              <div class="qa-desc">What does a non-disclosure agreement do?</div>
            </div>
          </div>
        </div>
      </div>`;
    return;
  }

  msgs.forEach(m => appendMsg(m.role, m.text, m.sources, false));
  area.scrollTop = area.scrollHeight;
}

// ── APPEND MESSAGE ────────────────────────────────────────────
function appendMsg(role, text, sources = [], save_ = true) {
  const area = document.getElementById("chatArea");

  // Remove welcome screen
  const welcome = area.querySelector(".welcome");
  if (welcome) welcome.remove();

  if (role === "user") {
    const div = document.createElement("div");
    div.className = "msg user";
    div.textContent = text;
    area.appendChild(div);
  } else {
    const row = document.createElement("div");
    row.className = "bot-row";

    const avatar = document.createElement("div");
    avatar.className = "bot-avatar";
    avatar.textContent = "⚖";

    const content = document.createElement("div");
    content.className = "bot-content";

    const msg = document.createElement("div");
    msg.className = "msg bot";
    msg.innerHTML = formatText(text);
    content.appendChild(msg);

    if (sources && sources.length) {
      const src = document.createElement("div");
      src.className = "sources-tag";
      src.innerHTML = `<span>📄</span><span>Sources: ${sources.join(", ")}</span>`;
      content.appendChild(src);
    }

    row.appendChild(avatar);
    row.appendChild(content);
    area.appendChild(row);
  }

  if (save_ && currentId) {
    chats[currentId].messages.push({ role, text, sources });
    if (role === "user" && chats[currentId].title === "New Chat") {
      chats[currentId].title = text.slice(0, 40) + (text.length > 40 ? "…" : "");
      renderSessions();
    }
    save();
  }

  area.scrollTop = area.scrollHeight;
}

// ── TYPING INDICATOR ──────────────────────────────────────────
function showTyping() {
  const area = document.getElementById("chatArea");
  const row = document.createElement("div");
  row.className = "typing-row";
  row.id = "typingRow";

  const avatar = document.createElement("div");
  avatar.className = "bot-avatar";
  avatar.textContent = "⚖";

  const dots = document.createElement("div");
  dots.className = "typing-dots";
  dots.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

  row.appendChild(avatar);
  row.appendChild(dots);
  area.appendChild(row);
  area.scrollTop = area.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById("typingRow");
  if (el) el.remove();
}

// ── SEND MESSAGE (STREAMING) ──────────────────────────────────
async function sendMessage() {
  const input = document.getElementById("msgInput");
  const sendBtn = document.getElementById("sendBtn");
  const text = input.value.trim();

  if (!text || !currentId || busy) return;

  busy = true;
  sendBtn.disabled = true;
  input.value = "";
  autoResize(input);
  closeAttach();

  appendMsg("user", text);
  showTyping();

  try {
    const res = await fetch(`${API_BASE}/ask/stream`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id: currentId, question: text })
    });

    hideTyping();

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      if (res.status === 429) {
        appendMsg("bot", "⏳ The AI is busy. Please wait a moment and try again.");
      } else {
        appendMsg("bot", "⚠️ " + (err.detail || "Something went wrong. Please try again."));
      }
      busy = false;
      sendBtn.disabled = false;
      input.focus();
      return;
    }

    // Create bot message bubble for streaming into
    const area = document.getElementById("chatArea");
    const welcome = area.querySelector(".welcome");
    if (welcome) welcome.remove();

    const row = document.createElement("div");
    row.className = "bot-row";

    const avatar = document.createElement("div");
    avatar.className = "bot-avatar";
    avatar.textContent = "⚖";

    const content = document.createElement("div");
    content.className = "bot-content";

    const msgEl = document.createElement("div");
    msgEl.className = "msg bot";
    content.appendChild(msgEl);
    row.appendChild(avatar);
    row.appendChild(content);
    area.appendChild(row);

    // Read SSE stream
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = "";
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop(); // keep incomplete line

      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        try {
          const payload = JSON.parse(line.slice(6));

          if (payload.error) {
            msgEl.innerHTML = formatText("⚠️ " + payload.error);
            break;
          }

          if (payload.chunk) {
            fullText += payload.chunk;
            msgEl.innerHTML = formatText(fullText);
            area.scrollTop = area.scrollHeight;
          }

          if (payload.done) {
            // Save to local storage
            if (currentId) {
              chats[currentId].messages.push({ role: "bot", text: fullText, sources: payload.sources || [] });
              if (chats[currentId].title === "New Chat" && fullText) {
                // title already set from user message
              }
              save();
            }
          }
        } catch (_) {}
      }
    }

  } catch (err) {
    hideTyping();
    appendMsg("bot", "⚠️ Cannot reach the server. Make sure the backend is running.");
  }

  busy = false;
  sendBtn.disabled = false;
  input.focus();
}

// ── PDF UPLOAD ────────────────────────────────────────────────
async function handleFileSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  closeAttach();
  await uploadPDF(file);
  document.getElementById("pdfInput").value = "";
}

async function uploadPDF(file) {
  const bar = document.getElementById("uploadBar");
  const pill = document.getElementById("docPill");

  bar.className = "upload-bar loading";
  bar.textContent = "⏳ Indexing " + file.name + "…";

  const form = new FormData();
  form.append("file", file);

  try {
    const res = await fetch(`${API_BASE}/upload_pdf`, { method: "POST", body: form });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      bar.className = "upload-bar error";
      bar.textContent = "❌ " + (err.detail || "Upload failed.");
      setTimeout(() => { bar.className = "upload-bar"; }, 4000);
      return;
    }

    bar.className = "upload-bar success";
    bar.textContent = "✅ " + file.name + " ready";
    pill.classList.add("visible");

    appendMsg("bot", `📄 "${file.name}" uploaded and indexed. You can now ask questions about it.`);

    setTimeout(() => { bar.className = "upload-bar"; }, 4000);

  } catch (err) {
    bar.className = "upload-bar error";
    bar.textContent = "❌ Upload failed. Is the server running?";
    setTimeout(() => { bar.className = "upload-bar"; }, 4000);
  }
}

// ── QUICK ACTIONS ─────────────────────────────────────────────
function useQuick(el) {
  const desc = el.querySelector(".qa-desc");
  if (!desc) return;
  const input = document.getElementById("msgInput");
  input.value = desc.textContent;
  autoResize(input);
  input.focus();
}

// ── TEXT FORMATTER ────────────────────────────────────────────
function formatText(text) {
  // Escape HTML to prevent XSS
  const escaped = text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");

  const lines = escaped.split("\n");
  let html = "";
  let listType = null; // "ol" or "ul" or null

  const closeList = () => {
    if (listType) { html += `</${listType}>`; listType = null; }
  };

  for (const rawLine of lines) {
    const line = rawLine.trim();

    if (!line) {
      closeList();
      html += "<br>";
      continue;
    }

    // Numbered list: "1. " or "1) "
    const numMatch = line.match(/^(\d+)[.)]\s+(.+)/);
    if (numMatch) {
      if (listType !== "ol") { closeList(); html += '<ol style="padding-left:20px;margin:6px 0 6px 0;">'; listType = "ol"; }
      html += `<li style="margin-bottom:5px;line-height:1.5;">${numMatch[2]}</li>`;
      continue;
    }

    // Bullet: "- " or "• "
    const bulletMatch = line.match(/^[-•]\s+(.+)/);
    if (bulletMatch) {
      if (listType !== "ul") { closeList(); html += '<ul style="padding-left:20px;margin:6px 0 6px 0;">'; listType = "ul"; }
      html += `<li style="margin-bottom:5px;line-height:1.5;">${bulletMatch[1]}</li>`;
      continue;
    }

    closeList();

    // Bold: **text**
    const formatted = line.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    html += `<p style="margin:5px 0;line-height:1.6;">${formatted}</p>`;
  }

  closeList();
  return html;
}

// ── HELPERS ───────────────────────────────────────────────────
function handleKey(event) {
  if (event.key === "Enter" && !event.shiftKey && window.innerWidth > 767) {
    event.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}

if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(r => console.log('SW:', r.scope))
      .catch(e => console.warn('SW failed:', e));

}
